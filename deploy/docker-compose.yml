services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 8080
      WORKERS: 2
      ADMIN_TOKEN: dev-token
      FAIL_STRATEGY: open
      LOG_LEVEL: info
      # NODE_OPTIONS: --max-old-space-size=256  # uncomment for memory-constrained envs
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
